# Power Architecture Configuration
# Based on hardware design in: hardware/KiCad/FC_v1.0/FC-power-section.kicad_sch
# Matching v0.7 board as of 2025-01-04

# =============================================================================
# PIXHAWK POWER MODULE COMPATIBILITY
# =============================================================================
pixhawk_compatibility:
  standard: "Pixhawk Power Module Interface"
  connector: "JST GH 6-pin (SM06B-GHS-TB), 1A per contact"

  pinout:
    pin1_pin2: "VCC (+5V, dual pins for 2A total)"
    pin3: "BAT_CURRENT (analog 0-3.3V)"
    pin4: "BAT_VOLTAGE (analog 0-3.3V)"
    pin5_pin6: "GND (dual pins)"

  typical_module:
    output: "5.0V, 2.0-3.0A"
    input: "2S-6S LiPo"
    features: "Regulated 5V, voltage/current sensing, overcurrent protection"

# =============================================================================
# CURRENT BUDGET
# =============================================================================
current_budget:
  onboard_3v3: "~550mA (STM32: 400mA, sensors: 10mA, SD: 100mA, misc: 40mA)"
  buck_input_5v: "~750mA (75% efficiency)"
  external_peripherals: "GPS/telemetry connect directly to EXT_5V (bypasses MUX)"
  total_from_module: "~1.0-1.5A"
  margin: "25-50% headroom"

# =============================================================================
# POWER INPUT SOURCES
# =============================================================================
power_inputs:
  ext_5v:
    source: "Pixhawk power module"
    voltage: 5.0
    current: "2.0-3.0A"
    connector: "J_PWR (SM06B-GHS-TB)"
    protection: "R_ILIM = 250Ω, D6 (TSD05DYFR) ESD"
    priority: "Primary (via TPS2113A MUX)"

  vbus:
    source: "USB"
    voltage: 5.0
    current: "0.5-2.0A (port dependent)"
    protection: "D6 (TSD05DYFR) ESD"
    priority: "Secondary (development/testing only)"

  battery_monitoring:
    voltage_sense: "BAT_VOLTAGE (Pin 4) → STM32 ADC, 0-3.3V analog, requires calibration"
    current_sense: "BAT_CURRENT (Pin 3) → STM32 ADC, 0-3.3V analog, requires calibration"

# =============================================================================
# POWER MANAGEMENT ICs
# =============================================================================
power_management_ics:
  power_mux:
    ref: "U2"
    part: "TPS2113ADRBR"
    function: "Ideal-diode power MUX"
    package: "DRB8"

    config:
      inputs: "IN1: EXT_5V (priority 1), IN2: VBUS (priority 2)"
      output: "5V_SYS, 2.5A max, ~1.0-1.5A typical"
      switching: "Automatic, EXT_5V > USB, reverse current blocking"
      voltage_drop: "~0.1-0.2V"

  buck_converter:
    ref: "U3"
    part: "TPS62130RGTR"
    function: "Synchronous buck converter"
    package: "RGT16 (QFN 16-pin)"

    specs:
      input: "5V_SYS (3.0-17.0V capable)"
      output: "3V3_DIG, 3.3V ±3%, 2.0A max, ~0.6-1.0A typical"
      ripple: "<50mV p-p"
      efficiency: "~75-85% @ 0.5-2.0A"
      switching_freq: "~1MHz"

  ldo_analog:
    ref: "U4"
    part: "TPS7A2133"
    function: "Low-noise LDO regulator"
    package: "8-VDFN (3x3mm)"

    specs:
      input: "5V_SYS (3.0-17.0V capable)"
      output: "3V3_ANA, 3.3V ±3%, 300mA max, ~20-50mA typical"
      ripple: "<10mV p-p"
      noise: "4.5µVRMS (10Hz-100kHz)"
      dropout: "210mV @ 300mA"

# =============================================================================
# POWER RAILS
# =============================================================================
power_rails:
  5v_sys:
    voltage: "5.0V ±5% (4.75-5.25V)"
    source: "U2 (TPS2113ADRBR)"
    current: "2.5A max, ~1.0-1.5A typical"
    loads: "Buck converter: ~750mA, Future onboard: ~1.0A margin"
    ripple: "<100mV p-p"
    notes: "Reserved for ONBOARD systems. External peripherals connect to EXT_5V (bypass MUX)"

  3v3_dig:
    voltage: "3.3V ±3% (3.20-3.40V)"
    source: "U3 (TPS62130RGTR)"
    current: "2.0A max, ~0.6-1.0A typical"
    loads: "STM32: ~400mA, Interfaces: ~50mA, SD: ~100mA, LEDs/misc: ~30mA, Margin: ~1.0A"
    ripple: "<50mV p-p"
    filtering: "C25: 10µF, C26: 100nF, C27: 3.3nF, C28: 22µF"

  3v3_ana:
    voltage: "3.3V ±3% (3.20-3.40V)"
    source: "FB1 (ferrite filter from 3V3_DIG)"
    current: "300mA max, ~20-50mA typical"
    loads: "IMU: ~1mA, MAG: ~3mA, Barometer: ~5mA, STM32 VDDA: ~10mA, GPS: ~50-150mA (optional)"
    ripple: "<10mV p-p"
    filtering: "FB1 + C14: 100nF + C15: 1µF"
    notes: "Clean power for precision sensors and ADC. Critical for IMU/MAG performance"

# =============================================================================
# POWER DISTRIBUTION HIERARCHY
# =============================================================================
power_distribution:
  flow: |
    Pixhawk Power Module (2-3A @ 5V)
      ├─ EXT_5V ──┬─ External Peripherals (GPS, telemetry) - Direct, bypasses MUX
      │           └─ TPS2113A IN1 (priority 1)
      ├─ BAT_VOLTAGE → STM32 ADC
      └─ BAT_CURRENT → STM32 ADC

    USB_VBUS (0.5-2A, dev only) ── D6 (ESD) ── TPS2113A IN2 (priority 2)

    TPS2113A (U2) → 5V_SYS (2.5A, onboard only)
      |  └─ TPS62130 (U3) → 3V3_DIG (2.0A)
      |       └─ STM32H743, peripherals, interfaces, SD card
      └──── TPS7A2133 (U4) → 3V3_ANA 
            └─ ICM-40609-D, MMC5983MA, BMP390, STM32 VDDA

  grounding: "solid common ground plane but sensible ICs in separate areas"





